server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Assets Angular con hash nel nome → cache 1 anno immutabile
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html senza cache (Angular usa hash sui bundle, l'html cambia ad ogni deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA routing: qualsiasi route Angular → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check usato da Uptime Kuma / Traefik
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
