<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <!-- security: interpolazione, non [innerHTML]: i messaggi sono testo (nomi conto,
       pattern alias inseriti dall'utente) e non devono passare per il sanitizer HTML
       (Angular ha una CVE di bypass del sanitizer in questa fascia di versioni). -->
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close(false)">
    {{ cancelLabel }}
  </button>
  <button mat-flat-button
          [color]="data.danger ? 'warn' : 'primary'"
          (click)="dialogRef.close(true)">
    {{ confirmLabel }}
  </button>
</mat-dialog-actions>
