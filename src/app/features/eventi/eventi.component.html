<div class="eventi-page">
  <div class="page-header">
    <div class="page-header__title">
      <span class="page-eyebrow">Gestione</span>
      <h1 class="page-title">Eventi</h1>
    </div>
    @if (auth.isAdmin()) {
      <button mat-raised-button color="primary" (click)="openNuovoEvento()">
        <mat-icon>add</mat-icon>
        Nuovo Evento
      </button>
    }
  </div>

  <mat-tab-group animationDuration="200ms">
    @if (!auth.isAdmin()) {
      <mat-tab label="I Miei">
        <div class="tab-content">
          <app-eventi-miei-list />
        </div>
      </mat-tab>
    }
    <mat-tab label="Tutti gli eventi">
      <div class="tab-content">
        <app-eventi-list [refresh]="refreshTrigger()" />
      </div>
    </mat-tab>
    <mat-tab label="Calendario">
      <div class="tab-content">
        <app-eventi-calendario [refresh]="refreshTrigger()" />
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
