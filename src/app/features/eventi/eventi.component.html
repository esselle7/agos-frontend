<div class="eventi-page">
  <div class="page-header">
    <h1 class="page-title">Eventi</h1>
    <button mat-raised-button color="primary" (click)="openNuovoEvento()">
      <mat-icon>add</mat-icon>
      Nuovo Evento
    </button>
  </div>

  <mat-tab-group animationDuration="200ms">
    <mat-tab label="Lista">
      <div class="tab-content">
        <app-eventi-list [refresh]="refreshTrigger()" />
      </div>
    </mat-tab>
    <mat-tab label="Calendario">
      <div class="tab-content">
        <app-eventi-calendario [refresh]="refreshTrigger()" />
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
